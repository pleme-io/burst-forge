# burst-forge scaling matrix configuration
# Example using Akeyless injection — adapt field values for your injection system

namespace: scale-test
deployment: nginx-burst
timeout_secs: 600
poll_interval_secs: 5

# Cooldown seconds between matrix scenarios (applied AFTER drain completes, default: 15)
cooldown_secs: 15

# Seconds to wait for HelmRelease rollout after patching replicas (default: 120)
rollout_wait_secs: 120

# Node readiness poll interval in seconds (default: 15)
node_poll_interval_secs: 15

# Pod drain configuration — ensures clean state between scenarios
# Max seconds to wait for pods to terminate during drain (default: 120)
drain_timeout_secs: 120
# How often to check pod count during drain (default: 5)
drain_poll_interval_secs: 5

# Pod label selector override (default: app={deployment})
# pod_label: "app=nginx-burst"

# Image cache (Zot registry) configuration
image_cache:
  namespace: image-cache
  label: "app.kubernetes.io/name=zot"
  registry: "image-cache.image-cache.svc.cluster.local:5000"

required_images:
  - "akeyless/k8s-secrets-sidecar:0.35.1"
  - "akeyless/k8s-webhook-server:latest"
  - "library/nginx:1.27-alpine"

# FluxCD kustomization wait configuration
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-image-sync
    - infrastructure-injection
    - infrastructure-injection-webhook
    - scale-test-workloads

# Injection infrastructure — configure for your injection system
injection_namespace: akeyless-system
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection

# Injection detection mode: "sidecar" (2+ containers) or "env" (env var prefix match)
# Use "env" when using env-var-based injection (no sidecar added)
# Use "sidecar" when using the classic sidecar injection pattern
injection_mode: env

# Environment variable prefix for "env" injection detection (default: "AKEYLESS_")
injection_env_prefix: "AKEYLESS_"

# EKS node group management for burst testing
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: my-aws-profile
  pods_per_node: 58
  max_nodes: 20

# DaemonSet warmup — wait for image pre-pull after node scale-up
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300

# Confluence reporting — auto-publish results after matrix run
# API token read from CONFLUENCE_API_TOKEN env var
confluence:
  base_url: "myorg.atlassian.net"
  space_key: "MYSPACE"
  parent_page_id: "12345"
  user_email: "user@example.com"

# Scaling matrix — work backwards from 1000 pods
# Historical data: GW = pods/90 with 40% headroom
scenarios:
  - name: "1000-pods"
    replicas: 1000
    gateway_replicas: 6
    webhook_replicas: 7

  - name: "750-pods"
    replicas: 750
    gateway_replicas: 5
    webhook_replicas: 5

  - name: "500-pods"
    replicas: 500
    gateway_replicas: 3
    webhook_replicas: 4

  - name: "300-pods"
    replicas: 300
    gateway_replicas: 2
    webhook_replicas: 3

  - name: "150-pods"
    replicas: 150
    gateway_replicas: 1
    webhook_replicas: 2

  - name: "50-pods"
    replicas: 50
    gateway_replicas: 1
    webhook_replicas: 1
