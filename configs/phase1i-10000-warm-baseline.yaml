# Experiment E: Customer simulation — 8 warm GW baseline.
#
# Simulates a real production customer who already has 8 GW pods running.
# burst-forge only needs to scale from 8 -> 30 (22 cold starts).
# The 8 warm pods absorb initial injection load while new pods start.
#
# Pre-requisite: before running this flow, set GW baseline to 8:
#   kubectl -n akeyless-system scale deployment unified-akeyless-gateway --replicas=8
#   kubectl -n akeyless-system rollout status deployment/unified-akeyless-gateway --timeout=300s
#   (wait for all 8 to be Ready and warm — ~3 min for initial ClusterCache sync)
#
# Key difference from phase1i-10000-prewarmed.yaml:
# - gateway_batch_size: 10 (validated in Experiment B)
# - Only 22 cold-start pods (30-8=22), not 30
# - Warm baseline absorbs burst load during GW scaling
#
# Expected outcome:
# - GW scaling: 8→18→28→30 (3 waves, ~2 min each = ~6 min)
# - But burst can start IMMEDIATELY with 8 warm GW
# - Total experiment: should be significantly faster because
#   the warm baseline handles injection while cold pods join
#
# What this proves:
# - Customer recommendation: keep baseline at 8 GW pods
# - GW cold-start overhead is masked by warm capacity
# - Auto-scale from 8 only when actual load demands it

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
gateway_batch_size: 10
secrets_per_pod: 2
burst_batch_size: 2500
burst_batch_wait_secs: 5
timeout_secs: 1800
poll_interval_secs: 5
cooldown_secs: 60
rollout_wait_secs: 600
node_poll_interval_secs: 15
drain_timeout_secs: 300
drain_poll_interval_secs: 5
ipamd_warmup_secs: 300
suspend_kustomizations:
  - infrastructure-akeyless
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_annotation_key: "akeyless/secret-path"
injection_namespace: akeyless-system
gateway_container_name: akeyless-gateway
webhook_container_name: akeyless-secrets-injection
init_container_name: customer-init
workload_container_name: nginx
secret_path_prefix: "/pleme/test/hello"
gate_gw_readiness_threshold: 0.9
autoscaler:
  deployment_name: cluster-autoscaler-aws-cluster-autoscaler
  namespace: kube-system
  replicas: 1
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
vector_endpoint: "http://localhost:9500"
scenarios:
  - name: "gw30-wh16-10000-warm-baseline"
    replicas: 10000
    gateway_replicas: 30
    webhook_replicas: 16
