# Phase 1i: 10000-pod scaling — the target milestone.
#
# GW formula: ceil(10000*2/(5*67)) = 60. We test gw=30 (headroom from
# Phase 1h) and gw=60 (formula floor).
#
# WH=16 — Phase 1c saturation was at 12, but at 10000 pods the admission
# queue depth is 5x higher so we bump to 16 for safety.
#
# Cost: 173 burst-spot nodes × $0.058/hr ≈ $10/hr. Each scenario ~15-20
# min. Total: ~$5 for 2 scenarios.
#
# Requires:
# - /18 pod subnets (applied via pangea IaC)
# - 8 diversified spot instance families
# - WARM_PREFIX_TARGET=1 on aws-node
# - kube-system excluded from webhook admission
# - webhook pre-scaled before burst nodes

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
gateway_batch_size: 5
secrets_per_pod: 2
timeout_secs: 1800
poll_interval_secs: 5
cooldown_secs: 60
rollout_wait_secs: 600
node_poll_interval_secs: 15
drain_timeout_secs: 300
drain_poll_interval_secs: 5
ipamd_warmup_secs: 120
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 900
vector_endpoint: "http://localhost:9500"
scenarios:
  - name: "gw30-wh16-10000-isolated"
    replicas: 10000
    gateway_replicas: 30
    webhook_replicas: 16
    gateway_memory_limit: "1536Mi"

  - name: "gw60-wh16-10000-isolated"
    replicas: 10000
    gateway_replicas: 60
    webhook_replicas: 16
    gateway_memory_limit: "1536Mi"
