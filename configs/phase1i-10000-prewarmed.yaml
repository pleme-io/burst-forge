# Phase 1i: 10000-pod burst — pre-warmed infrastructure.
#
# Simulates a real customer environment: nodes exist, IPAMD is warm,
# images are cached, GW/WH are at target replicas. The burst measures
# pure pod scheduling + secret injection time.
#
# Key difference from phase1i-10000-pod-isolated.yaml:
# - IPAMD warmup: 300s (vs 120s) — all 173 nodes fully warm
# - Single scenario: gw30-wh16 (proven at 2000, skip gw60 initially)
# - Timeout: 1800s (30 min — enough for 10000 pods to fully schedule)
#
# What this measures (real customer experience):
# - kube-scheduler throughput at 10000 simultaneous pods
# - IPAMD IP assignment from warm prefix pools
# - kubelet pod creation rate per node
# - Akeyless init container secret fetch latency at 10000 concurrent
#
# What this does NOT measure (test harness, pre-warmed):
# - Node provisioning time (nodes pre-scaled)
# - ENI attachment time (IPAMD pre-warmed)
# - Image pull time (DaemonSet pre-cached)
# - GW cold-start (GW pre-scaled with ClusterCache)
#
# Cost: 173 burst-spot nodes × $0.058/hr ≈ $10/hr.
# Budget ~30 min = ~$5 per run.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
gateway_batch_size: 5
secrets_per_pod: 2
timeout_secs: 1800
poll_interval_secs: 5
cooldown_secs: 60
rollout_wait_secs: 600
node_poll_interval_secs: 15
drain_timeout_secs: 300
drain_poll_interval_secs: 5
# 300s IPAMD warmup — all 173 nodes must fully attach secondary ENIs
# and receive /28 prefix delegations before burst begins. At 120s,
# only ~50% of nodes have warm IP pools (7409/10000 Pending at burst).
ipamd_warmup_secs: 300
suspend_kustomizations:
  - infrastructure-akeyless
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 900
vector_endpoint: "http://localhost:9500"
scenarios:
  - name: "gw30-wh16-10000-prewarmed"
    replicas: 10000
    gateway_replicas: 30
    webhook_replicas: 16
