# burst-forge configuration — ASM-17583 scalability validation
# Scenarios match the scalability table from ASM-17540 (Cerebras)
# Order: largest first, descending — maximum pressure first

namespace: scale-test
deployment: nginx-burst
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 15
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5

# Injection detection
injection_mode: env
injection_env_prefix: "AKEYLESS_"

# Injection infrastructure (Akeyless gateway + webhook)
injection_namespace: akeyless-system
gateway_deployment: akeyless-gateway-akeyless-api-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-api-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection

# FluxCD dependencies
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads

# EKS node group (burst-forge manages lifecycle)
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 20

# Image warmup DaemonSet
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300

# Confluence reporting
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"

# ASM-17540 scalability table — QPS=5 locked, largest first descending
# GW formula: ~1 GW per 91 pods (55 req/s served 1000 pods in 18s)
# WH formula: ~33 admissions/sec per replica, 30s timeout window
# Run Experiment 4 first:  burst-forge matrix --scenario "1000-pods"
# Then full matrix:        burst-forge matrix
scenarios:
  # Original ASM-17540 table counts — validate at QPS=5
  - name: "1000-original"
    replicas: 1000
    gateway_replicas: 6
    webhook_replicas: 7

  - name: "750-original"
    replicas: 750
    gateway_replicas: 4
    webhook_replicas: 5

  - name: "500-original"
    replicas: 500
    gateway_replicas: 3
    webhook_replicas: 4

  - name: "300-original"
    replicas: 300
    gateway_replicas: 2
    webhook_replicas: 4

  - name: "150-original"
    replicas: 150
    gateway_replicas: 1
    webhook_replicas: 2

  - name: "50-original"
    replicas: 50
    gateway_replicas: 1
    webhook_replicas: 1

  # Our QPS=5 optimized counts (validated)
  - name: "1000-pods"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 7

  - name: "750-pods"
    replicas: 750
    gateway_replicas: 8
    webhook_replicas: 6

  - name: "500-pods"
    replicas: 500
    gateway_replicas: 6
    webhook_replicas: 4

  - name: "300-pods"
    replicas: 300
    gateway_replicas: 4
    webhook_replicas: 3

  - name: "150-pods"
    replicas: 150
    gateway_replicas: 2
    webhook_replicas: 2

  - name: "50-pods"
    replicas: 50
    gateway_replicas: 1
    webhook_replicas: 1
