# Cerebras full matrix — ASM-17583
# Customer constraints: 2 secrets/pod, 3 shared nodes, QPS=5, 30s timeout
# 2-secret deployment: /pleme/test/hello,/pleme/test/hello2
# Tests all tiers 50-1000 to advise optimal GW/WH for each scale

namespace: scale-test
deployment: nginx-burst
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 15
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 20
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"

# Cerebras-constraint matrix: 2 secrets/pod doubles GW load
# GW formula at 2 secrets: effective QPS per GW = 2.5 pods/s (5 req/s / 2 secrets)
# All scenarios use original table GW/WH counts
scenarios:
  - name: "cerebras-1000"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 7

  - name: "cerebras-750"
    replicas: 750
    gateway_replicas: 8
    webhook_replicas: 6

  - name: "cerebras-500"
    replicas: 500
    gateway_replicas: 6
    webhook_replicas: 4

  - name: "cerebras-300"
    replicas: 300
    gateway_replicas: 4
    webhook_replicas: 3

  - name: "cerebras-150"
    replicas: 150
    gateway_replicas: 2
    webhook_replicas: 2

  - name: "cerebras-50"
    replicas: 50
    gateway_replicas: 1
    webhook_replicas: 1
