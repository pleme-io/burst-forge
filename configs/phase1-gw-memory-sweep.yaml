# Phase 1: GW Memory Sweep — find the memory knee properly
# Previous sweep results are invalid (bug: memory-only patches were skipped).
# Test WH=5 (large-scale optimal) and WH=12 (high contention) across memory limits.
# Hypothesis: 1Gi is the knee; 1536Mi/2Gi show diminishing returns.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
secrets_per_pod: 2
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 30
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 20
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 5
  baseline: 3
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
vector_endpoint: "http://vector.observability.svc:9500"
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"
  token_path: "~/.config/atlassian/akeyless/api-token"
scenarios:
  # WH=5 (large-scale optimal), sweep GW memory
  - name: "wh5-512mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 5
    gateway_memory_limit: "512Mi"

  - name: "wh5-768mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 5
    gateway_memory_limit: "768Mi"

  - name: "wh5-1gi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 5
    gateway_memory_limit: "1Gi"

  - name: "wh5-1536mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 5
    gateway_memory_limit: "1536Mi"

  - name: "wh5-2gi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 5
    gateway_memory_limit: "2Gi"

  # WH=12 (high contention), sweep GW memory
  - name: "wh12-512mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 12
    gateway_memory_limit: "512Mi"

  - name: "wh12-768mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 12
    gateway_memory_limit: "768Mi"

  - name: "wh12-1gi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 12
    gateway_memory_limit: "1Gi"

  - name: "wh12-1536mi"
    replicas: 1000
    gateway_replicas: 15
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"
