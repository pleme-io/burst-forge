# Phase 1f: 1500-pod scaling on the same isolated infrastructure that
# Phase 1e validated.
#
# Carries forward all Phase 1e fixes:
#   - GW memory request = limit (burst-forge 63f9105)
#   - customer-init = /bin/true (k8s 8808e97)
#   - GW/WH node groups auto-scaled per scenario (burst-forge f32c812)
#   - nginx-burst nodeSelector burst-forge=true (k8s ce387a5)
#   - nodegroup-aware rollout window (rollout_wait_secs=300)
#
# Scaling formula for sub-90s admission:
#     gw = ceil(pods * secrets / (qps * 67))
#     gw(1500, 2, 5) = ceil(3000 / 335) = 9
#
# We test gw=9 (formula prediction), gw=12 (1.3x headroom), and gw=16
# (Phase 1e baseline carried forward to validate the curve continues
# to flatten as gw grows). WH stays at 12 — Phase 1c showed WH=12 is
# saturation; bumping wouldn't help until pod count exceeds ~3000.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
secrets_per_pod: 2
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 30
rollout_wait_secs: 300
node_poll_interval_secs: 15
drain_timeout_secs: 180
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: akeyless-gateway-akeyless-api-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-api-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 6
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
vector_endpoint: "http://localhost:9500"
scenarios:
  # gw9-wh12: formula prediction for sub-90s at 1500 pods.
  - name: "gw9-wh12-1500-isolated"
    replicas: 1500
    gateway_replicas: 9
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"

  # gw12-wh12: 1.3x the formula's gw9 — headroom test.
  - name: "gw12-wh12-1500-isolated"
    replicas: 1500
    gateway_replicas: 12
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"

  # gw16-wh12: carry-forward of Phase 1e top-end gateway count.
  # Lets us see whether the curve flattens or keeps gaining at this scale.
  - name: "gw16-wh12-1500-isolated"
    replicas: 1500
    gateway_replicas: 16
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"
