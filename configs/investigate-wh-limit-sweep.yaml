# Investigation: WH CPU limit sweep at 12 replicas
# Hypothesis: matching total CPU limits (6100m) at WH=12 should match WH=3 speed
# Test 1: 50m and 100m limits. Test 2: no limit (0).
# Investigation: CPU observation at WH=3
# Run with: burst-forge flow investigate-wh-cpu-3
# Simultaneously run: kubectl top pods -n akeyless-system --sort-by=cpu -l 'app.kubernetes.io/name=akeyless-api-gateway or app=akeyless-secrets-injection' every 5s

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 15
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: akeyless-gateway-akeyless-api-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-api-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 10
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 3
  baseline: 3
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"
  token_path: "~/.config/atlassian/akeyless/api-token"
scenarios:
  - name: "baseline-3wh-200m"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 3
    # Default 200m limit — baseline (total limits: 6100m, 5% over)

  - name: "12wh-50m"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 12
    webhook_cpu_request: "25m"
    webhook_cpu_limit: "50m"
    # Total WH limits: 600m. Total all: 6100m (5% over — matches baseline)

  - name: "12wh-100m"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 12
    webhook_cpu_request: "50m"
    webhook_cpu_limit: "100m"
    # Total WH limits: 1200m. Total all: 6700m (15% over)

  - name: "12wh-no-limit"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 12
    webhook_cpu_request: "25m"
    webhook_cpu_limit: "0"
    # No WH limit. Total limits: 5500m (GW only — under capacity)

  - name: "12wh-200m"
    replicas: 1000
    gateway_replicas: 11
    webhook_replicas: 12
    # Default 200m limit — reproduces original penalty (total limits: 7900m, 36% over)
