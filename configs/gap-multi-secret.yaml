# Multi-secret scaling test
# Question: does 5/10 secrets per pod scale linearly at QPS=5?
# Each secret = 1 additional gateway request per pod.
# At 10 secrets × 300 pods = 3000 gateway requests vs 600 for 2 secrets.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
timeout_secs: 600
poll_interval_secs: 5
cooldown_secs: 15
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 20
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 3
  baseline: 3
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"
  token_path: "~/.config/atlassian/akeyless/api-token"

# Multi-secret sweep: 300 pods, 10 GW, 3 WH
# Varying only the number of secrets per pod
# Note: secret-path annotation must be patched on the deployment before each scenario.
# For now, using 2 secrets (current deployment annotation). The expected_secrets field
# tracks what we expect to verify.
scenarios:
  - name: "2-secrets"
    replicas: 300
    gateway_replicas: 10
    webhook_replicas: 3
    expected_secrets: 2

  - name: "5-secrets"
    replicas: 300
    gateway_replicas: 10
    webhook_replicas: 3
    expected_secrets: 5

  - name: "10-secrets"
    replicas: 300
    gateway_replicas: 10
    webhook_replicas: 3
    expected_secrets: 10
