# Experiment D: Single-wave GW scaling — no batching.
#
# Tests whether all 30 GW pods can cold-start simultaneously with
# ClusterCache + optimized startupProbe. If this works, customers
# don't need staged scaling at all.
#
# Difference from phase1i-10000-prewarmed.yaml:
# - gateway_batch_size: 0 (all 30 at once, no waves)
# - post_scale_stabilize_secs stays at 30 (validated in Experiment C)
#
# Expected outcome:
# - ClusterCache: only leader does full-sync, 29 followers read Redis
# - startupProbe: initialDelaySeconds=15, periodSeconds=5 (validated)
# - All 30 should reach Ready within ~60-90s (leader) + ~30s (followers)
# - Total GW scaling: ~2-3 min (vs 6 min batched, 30 min pre-optimization)
#
# Risk: if rate limiting still applies to authentication (not just sync),
# pods may CrashLoopBackOff. Batched fallback is Experiment A+B+C.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
# Experiment D: no batching — single wave of 30
gateway_batch_size: 0
secrets_per_pod: 2
burst_batch_size: 2500
burst_batch_wait_secs: 5
timeout_secs: 1800
poll_interval_secs: 5
cooldown_secs: 60
rollout_wait_secs: 600
node_poll_interval_secs: 15
drain_timeout_secs: 300
drain_poll_interval_secs: 5
ipamd_warmup_secs: 300
suspend_kustomizations:
  - infrastructure-akeyless
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_annotation_key: "akeyless/secret-path"
injection_namespace: akeyless-system
gateway_container_name: akeyless-gateway
webhook_container_name: akeyless-secrets-injection
init_container_name: customer-init
workload_container_name: nginx
secret_path_prefix: "/pleme/test/hello"
gate_gw_readiness_threshold: 0.9
autoscaler:
  deployment_name: cluster-autoscaler-aws-cluster-autoscaler
  namespace: kube-system
  replicas: 1
gateway_deployment: unified-akeyless-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
vector_endpoint: "http://localhost:9500"
scenarios:
  - name: "gw30-wh16-10000-single-wave"
    replicas: 10000
    gateway_replicas: 30
    webhook_replicas: 16
