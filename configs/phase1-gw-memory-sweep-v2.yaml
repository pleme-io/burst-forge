# Phase 1 v2: GW Memory Sweep — fixed node capacity
# v1 findings: all scenarios hit 930/1000 ceiling (node slot exhaustion, not GW memory).
# Fix: WH=5 at 500 pods (fits on 10 nodes), WH=12 at 500 pods (avoids slot contention).
# This isolates memory as the variable by keeping node capacity abundant.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
secrets_per_pod: 2
timeout_secs: 300
poll_interval_secs: 5
cooldown_secs: 30
rollout_wait_secs: 180
node_poll_interval_secs: 15
drain_timeout_secs: 120
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: akeyless-gateway-akeyless-api-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-api-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 20
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 5
  baseline: 3
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 300
vector_endpoint: "http://vector.observability.svc:9500"
confluence:
  base_url: "akeyless.atlassian.net"
  space_key: "~7120203936f1d3939b4810895c20eb2bc58ae4"
  parent_page_id: "3972595716"
  user_email: "luis.d@akeyless.io"
  token_path: "~/.config/atlassian/akeyless/api-token"
scenarios:
  # WH=5, sweep GW memory at 500 pods (10 nodes — no slot contention)
  - name: "wh5-512mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 5
    gateway_memory_limit: "512Mi"

  - name: "wh5-768mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 5
    gateway_memory_limit: "768Mi"

  - name: "wh5-1gi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 5
    gateway_memory_limit: "1Gi"

  - name: "wh5-1536mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 5
    gateway_memory_limit: "1536Mi"

  - name: "wh5-2gi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 5
    gateway_memory_limit: "2Gi"

  # WH=12, sweep GW memory at 500 pods (isolate WH contention from node pressure)
  - name: "wh12-512mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 12
    gateway_memory_limit: "512Mi"

  - name: "wh12-768mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 12
    gateway_memory_limit: "768Mi"

  - name: "wh12-1gi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 12
    gateway_memory_limit: "1Gi"

  - name: "wh12-1536mi-500"
    replicas: 500
    gateway_replicas: 8
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"
