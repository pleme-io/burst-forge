# Phase 1h: 5000-pod scaling — halfway to 10000.
#
# Skipping 2500/3000 — Phase 1f/1g data shows the bottlenecks are infra,
# not GW/WH count. Jump to 5000 to stress the new /18 subnets + webhook
# pre-scale + 8 spot families at real scale.
#
# GW formula: ceil(5000*2/(5*67)) = 30. We test gw=16 (carry-forward) and
# gw=30 (formula floor).
#
# Cost: 87 burst-spot nodes × $0.058/hr ≈ $5/hr. Each scenario ~10 min.
# Total: ~$1.70 for 2 scenarios.

kubeconfig: "~/.kube/scale-test.yaml"
namespace: scale-test
deployment: nginx-burst
qps: 5
gateway_batch_size: 5
secrets_per_pod: 2
timeout_secs: 1200
poll_interval_secs: 5
cooldown_secs: 30
rollout_wait_secs: 300
node_poll_interval_secs: 15
drain_timeout_secs: 180
drain_poll_interval_secs: 5
ipamd_warmup_secs: 60
suspend_kustomizations:
  - scale-test-workloads
injection_mode: env
injection_env_prefix: "AKEYLESS_"
injection_namespace: akeyless-system
gateway_deployment: akeyless-gateway-akeyless-api-gateway
webhook_deployment: akeyless-secrets-injection
gateway_label: "app.kubernetes.io/name=akeyless-api-gateway"
webhook_label: "app=akeyless-secrets-injection"
gateway_release: akeyless-gateway
webhook_release: akeyless-secrets-injection
flux:
  namespace: flux-system
  kustomizations:
    - infrastructure-image-cache
    - infrastructure-akeyless
    - infrastructure-akeyless-injection
    - scale-test-workloads
node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-burst-spot
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 58
  max_nodes: 200
worker_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-workers
  region: us-east-1
  aws_profile: akeyless-development
  desired: 4
  baseline: 1
gateway_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-gateway
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 4
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
webhook_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-webhook
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 6
  baseline: 1
  max_nodes: 16
  headroom_nodes: 0
observability_node_group:
  cluster_name: scale-test
  nodegroup_name: scale-test-observability
  region: us-east-1
  aws_profile: akeyless-development
  pods_per_node: 20
  max_nodes: 2
verify_teardown: true
warmup_daemonset:
  namespace: scale-test
  name: image-warmup
  timeout_secs: 600
vector_endpoint: "http://localhost:9500"
scenarios:
  - name: "gw16-wh12-5000-isolated"
    replicas: 5000
    gateway_replicas: 16
    webhook_replicas: 12
    gateway_memory_limit: "1536Mi"

  - name: "gw30-wh16-5000-isolated"
    replicas: 5000
    gateway_replicas: 30
    webhook_replicas: 16
    gateway_memory_limit: "1536Mi"
